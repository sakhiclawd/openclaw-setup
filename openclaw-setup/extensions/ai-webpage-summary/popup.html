<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 350px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
    }
    .title {
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }
    #loading {
      text-align: center;
      display: none;
      padding: 20px;
    }
    #content {
      display: block;
    }
    .summary-box {
      background: #f9f9f9;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #eee;
      line-height: 1.5;
      font-size: 14px;
      color: #444;
      max-height: 300px;
      overflow-y: auto;
    }
    .meta {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }
    .btn {
      background: #007AFF;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      margin-top: 15px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:hover {
      background: #0062CC;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-secondary:hover {
      background: #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">AI Webpage Summary</div>
  </div>

  <div id="loading">
    Generating summary... 🌸
  </div>

  <div id="content">
    <div id="summary" class="summary-box">
      Click the button below to summarize this page.
    </div>
    <div class="meta">
      <span id="readingTime"></span>
    </div>
    <button id="summarizeBtn" class="btn">Summarize Now</button>
    <button id="notionBtn" class="btn btn-secondary" style="display:none;">Export to Notion</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
